---
- name: Check for adb in PATH
  command: which adb
  delegate_to: localhost
  changed_when: false
  failed_when: false
  register: adb_in_path

- name: Check for adb in ~/.local/platform-tools fallback
  stat:
    path: "{{ lookup('env', 'HOME') }}/.local/platform-tools/adb"
  delegate_to: localhost
  register: adb_local_stat

- name: Fail if ADB is not found anywhere
  fail:
    msg: "ADB not found in PATH or ~/.local/platform-tools/. Install android-tools-adb or download platform-tools."
  when: adb_in_path.rc != 0 and not adb_local_stat.stat.exists

- name: Set adb_cmd fact
  set_fact:
    adb_cmd: >-
      {{ adb_in_path.stdout | trim if adb_in_path.rc == 0
         else lookup('env', 'HOME') + '/.local/platform-tools/adb' }}

- name: Scan for open ADB wireless debugging port
  command: >
    python3 -c "
    import socket, sys
    host = sys.argv[1]
    for port in range(37000, 45000):
        try:
            s = socket.create_connection((host, port), timeout=0.1)
            s.close()
            print(port)
            break
        except Exception:
            pass
    " {{ local_ip }}
  delegate_to: localhost
  changed_when: false
  failed_when: false
  register: adb_port_scan

- name: Override adb_port with discovered port if found
  set_fact:
    adb_port: "{{ adb_port_scan.stdout | trim | int }}"
  when: adb_port_scan.stdout | trim | regex_search('^[0-9]+$') is not none

- name: Report discovered port
  debug:
    msg: "Port discovery: using {{ adb_port }}"

# Gather facts via the adb_facts module: it ensures a responsive ADB server,
# performs a bounded connectivity probe (so an asleep device is skipped instead
# of hanging), then collects real device facts into ansible_facts.android.
- name: Gather Android facts over ADB
  cletus_mccoy.android_adb.adb_facts:
    device: "{{ local_ip }}:{{ adb_port }}"
    connect: true
    connect_timeout: "{{ probe_connect_timeout }}"
    ensure_server: "{{ probe_ensure_server }}"
    gather_subset: "{{ probe_gather_subset }}"
    fail_on_unreachable: "{{ not (probe_skip_unreachable | bool) }}"
  delegate_to: localhost
  register: adb_facts_result

- name: Note that the device was unreachable (skipping probe)
  debug:
    msg: "{{ inventory_hostname }} ({{ local_ip }}:{{ adb_port }}) unreachable (state={{ ansible_facts.android.state }}); skipping."
  when: not ansible_facts.android.reachable

- name: End host cleanly when the device is unreachable
  meta: end_host
  when: not ansible_facts.android.reachable

# Backwards-compatible facts: keep the names earlier consumers expect.
- name: Expose android_device_info / android_installed_apps facts
  set_fact:
    android_device_info:
      manufacturer: "{{ ansible_facts.android.manufacturer }}"
      model: "{{ ansible_facts.android.model }}"
      brand: "{{ ansible_facts.android.brand }}"
      android_ver: "{{ ansible_facts.android.android_version }}"
      sdk_version: "{{ ansible_facts.android.sdk }}"
      build_id: "{{ ansible_facts.android.build_id }}"
      serial: "{{ ansible_facts.android.serial }}"
      timezone: "{{ ansible_facts.android.timezone }}"
      locale: "{{ ansible_facts.android.locale }}"
    android_installed_apps: "{{ ansible_facts.android.installed_apps | default([]) }}"

- name: Display connection summary
  debug:
    msg:
      - "=== Android Probe: {{ inventory_hostname }} ==="
      - "  ADB target   : {{ local_ip }}:{{ adb_port }}"
      - "  Manufacturer : {{ android_device_info.manufacturer }}"
      - "  Model        : {{ android_device_info.model }}"
      - "  Brand        : {{ android_device_info.brand }}"
      - "  Android      : {{ android_device_info.android_ver }} (SDK {{ android_device_info.sdk_version }})"
      - "  Build ID     : {{ android_device_info.build_id }}"
      - "  Serial       : {{ android_device_info.serial }}"
      - "  Timezone     : {{ android_device_info.timezone }}"
      - "  Locale       : {{ android_device_info.locale }}"
      - "  Awake        : {{ ansible_facts.android.awake }}"
      - "  Rooted       : {{ ansible_facts.android.rooted | default('n/a') }}"
      - "  Server reset : {{ ansible_facts.android.server_restarted }}"
      - "  Apps found   : {{ android_installed_apps | length }} (user-installed)"
