- name: Ensure /data/local/tmp exists on device
  cletus_mccoy.android_adb.adb_shell:
    device: "{{ adb_device }}"
    command: "mkdir -p /data/local/tmp"

- name: Upload HelloWorldSelfAware APK to device
  cletus_mccoy.android_adb.adb_files:
    action: push
    src: "{{ playbook_dir }}/../../apks/HelloWorldSelfAware.apk"
    dest: /data/local/tmp/HelloWorldSelfAware.apk
    device: "{{ adb_device }}"

- name: Install HelloWorldSelfAware APK
  cletus_mccoy.android_adb.adb_install:
    apk_path: /data/local/tmp/HelloWorldSelfAware.apk
    device: "{{ adb_device }}"
    adb_path: adb
  register: install_apk_result
  ignore_errors: true

- name: Assert install succeeded or skip if restricted
  block:
    # Success means not failed. A second run is idempotent (changed=false) and is
    # still a pass — so don't require 'changed'.
    - assert:
        that:
          - install_apk_result is not failed
        fail_msg: "Install did not succeed for HelloWorldSelfAware.apk. Reason: {{ install_apk_result.msg | default('No message') }}"
  rescue:
    - debug:
        msg: "Skipping install test: device does not allow APK install (INSTALL_FAILED_USER_RESTRICTED or similar). Reason: {{ install_apk_result.msg | default('No message') }}"
    - meta: end_play

- name: Try to install with missing apk_path (should fail)
  cletus_mccoy.android_adb.adb_install:
    device: "{{ adb_device }}"
    adb_path: adb
  register: missing_path_result
  ignore_errors: true

- name: Assert missing apk_path fails
  assert:
    that:
      - missing_path_result.failed
      - missing_path_result.msg is defined
