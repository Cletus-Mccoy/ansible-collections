---
# Integration test for adb_screenrecord module
- name: Try to record the screen (should succeed or fail with msg)
  cletus_mccoy.android_adb.adb_screenrecord:
    path: /data/local/tmp/test.mp4
    duration: 1
  register: screenrecord_result
  ignore_errors: true

- name: Assert screenrecord result has msg or skip
  block:
    - assert:
        that:
          - screenrecord_result.msg is defined
  rescue:
    - debug:
        msg: "Skipping screenrecord test: module is not fully implemented or failed unexpectedly. Reason: {{ screenrecord_result.msg | default('No message') }}"
    - meta: end_play
