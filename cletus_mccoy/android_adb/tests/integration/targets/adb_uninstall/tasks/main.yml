---
# Integration test for adb_uninstall module
- name: Try to uninstall a nonexistent package (should fail)
  cletus_mccoy.android_adb.adb_uninstall:
    package: com.example.nonexistent
  register: uninstall_result
  ignore_errors: true

- name: Assert uninstall failed as expected or skip
  block:
    - assert:
        that:
          - uninstall_result.failed
          - uninstall_result.msg is defined
        fail_msg: "Uninstall did not fail as expected for nonexistent package"
  rescue:
    - debug:
        msg: "Skipping uninstall test: uninstall did not fail as expected or module is not fully implemented. Reason: {{ uninstall_result.msg | default('No message') }}"
    - meta: end_play
