---
# Integration test for the android_probe role end-to-end.
# Requires a connected device; set adb_device=<ip>:<port>.

- name: Load device address from tests/output/adb_devices.yml if not set
  set_fact:
    adb_device: "{{ lookup('file', playbook_dir + '/../../output/adb_devices.yml') | from_yaml | json_query('devices[0]') }}"
  when: adb_device is not defined and lookup('file', playbook_dir + '/../../output/adb_devices.yml', errors='ignore') != ''

- name: Fail fast if adb_device is not set
  fail:
    msg: "Set -e adb_device=<ip>:<port> when running this target."
  when: adb_device is not defined

- name: Run android_probe role
  include_role:
    name: cletus_mccoy.android_adb.android_probe
  vars:
    local_ip: "{{ adb_device.split(':')[0] }}"
    adb_port: "{{ adb_device.split(':')[1] }}"
    probe_include_system_apps: false

- name: Assert android_device_info was populated
  assert:
    that:
      - android_device_info is defined
      - android_device_info.manufacturer != 'unknown'
      - android_device_info.model != 'unknown'
      - android_device_info.android_ver != 'unknown'

- name: Assert app list was populated
  assert:
    that:
      - android_installed_apps is defined
      - android_installed_apps | length > 0
